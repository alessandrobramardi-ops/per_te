<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Un Regalo per Te</title>
    <style>
        /* ── FONT STACK offline-safe ──
           Script/calligraphy: Snell Roundhand (iOS/macOS), Segoe Script (Windows), cursive
           Serif body: Palatino (tutti i sistemi), Garamond (Windows), Georgia, serif       */
        :root {
            --cream: #fdf8f0;
            --parchment: #f5e6c8;
            --gold: #c9a84c;
            --gold-light: #e8d5a3;
            --brown: #6b4c35;
            --brown-deep: #3e2a1a;
            --sky: #87CEEB;
            --sky-deep: #4682B4;
            --red-seal: #c0392b;
            --shadow: rgba(62, 42, 26, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--cream);
            font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Garamond, Georgia, serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: var(--brown-deep);
            position: relative;
        }

        /* ─── TEXTURE & AMBIANCE ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(135,206,235,0.10) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(245,230,200,0.4) 0%, transparent 80%);
            pointer-events: none;
        }

        /* Floating particles */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        /* ─── ENVELOPE ─── */
        #envelope-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            animation: gentleFloat 4s ease-in-out infinite;
            /* Reset <a> defaults */
            background: none;
            border: none;
            padding: 0;
            margin: 0;
            font: inherit;
            outline: none;
            text-decoration: none;
            color: inherit;
            -webkit-appearance: none;
            appearance: none;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .envelope {
            position: relative;
            width: 340px;
            height: 220px;
            filter: drop-shadow(0 12px 30px var(--shadow));
        }

        /* Back of envelope — see definition below with decorative inner border */

        .env-decoration {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 3;
            pointer-events: none;
            border-radius: 0 0 10px 10px;
            overflow: hidden;
        }

        /* Bottom triangle of flap (V-shape showing inside) */
        .env-inside {
            position: absolute;
            top: 0; left: 0;
            width: 0; height: 0;
            border-left: 170px solid transparent;
            border-right: 170px solid transparent;
            border-top: 110px solid #eddbb5;
            z-index: 1;
        }

        /* Left and right triangles of the body */
        .env-side-left, .env-side-right {
            position: absolute;
            bottom: 0;
            width: 0; height: 0;
            z-index: 2;
        }
        .env-side-left {
            left: 0;
            border-bottom: 110px solid #d6bc72;
            border-right: 170px solid transparent;
        }
        .env-side-right {
            right: 0;
            border-bottom: 110px solid #cead56;
            border-left: 170px solid transparent;
        }

        /* Flap (top triangle) */
        .flap {
            position: absolute;
            top: 0; left: 0;
            width: 0; height: 0;
            border-left: 170px solid transparent;
            border-right: 170px solid transparent;
            border-top: 112px solid #e8c97e;
            z-index: 5;
            transform-origin: top center;
            transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.3s;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.12));
        }

        /* Flap inner shadow line */
        .flap::after {
            content: '';
            position: absolute;
            top: -112px;
            left: -170px;
            width: 0; height: 0;
            border-left: 170px solid transparent;
            border-right: 170px solid transparent;
            border-top: 4px solid rgba(0,0,0,0.08);
        }

        /* Decorative gold border on envelope interior bottom */
        .env-back {
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg, #f0dba8 0%, #e8c97e 100%);
            border-radius: 4px 4px 10px 10px;
            border: 1px solid rgba(201,168,76,0.4);
        }

        .env-back::after {
            content: '';
            position: absolute;
            inset: 8px;
            border: 1px solid rgba(201,168,76,0.35);
            border-radius: 2px 2px 7px 7px;
            pointer-events: none;
        }

                }

        /* Wax seal */
        #seal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 46px;
            height: 46px;
            background: radial-gradient(circle at 40% 35%, #e05a4e, var(--red-seal) 60%, #8b1a10);
            border-radius: 50%;
            z-index: 6;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow:
                0 3px 8px rgba(0,0,0,0.25),
                inset 0 1px 2px rgba(255,255,255,0.2),
                inset 0 -1px 2px rgba(0,0,0,0.2);
            transition: transform 0.4s, opacity 0.4s;
            cursor: pointer;
        }

        #seal:hover { transform: translate(-50%, -50%) scale(1.1); }
        #seal svg { width: 22px; fill: rgba(255,255,255,0.92); }

        .tap-instruction {
            margin-top: 22px;
            font-size: 0.85rem;
            letter-spacing: 0.12em;
            color: #a1887f;
            text-transform: uppercase;
            animation: pulse 2s ease-in-out infinite;
        }

        /* ─── OPEN ANIMATION ─── */
        .open .flap {
            transform: rotateX(180deg);
        }



        .open #seal {
            transform: translate(-50%, -50%) scale(0.3);
            opacity: 0;
        }

        /* ─── MAIN CONTENT ─── */
        #main-content {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 20px 20px;
        }

        .hidden { display: none !important; }

        .fade-in { animation: fadeInContent 1.8s cubic-bezier(0.4,0,0.2,1) forwards; }

        @keyframes fadeInContent {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── HEADER ─── */
        #messages {
            text-align: center;
            margin-bottom: 10px;
            margin-top: 4px;
            opacity: 0;
            animation: slideDown 1s 0.6s ease-out forwards;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #title {
            font-family: 'Snell Roundhand', 'Segoe Script', 'Bradley Hand', cursive;
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--sky-deep);
            margin-bottom: 6px;
            line-height: 1.3;
        }

        #quote {
            font-size: 1rem;
            font-style: italic;
            font-weight: 300;
            color: var(--brown);
            letter-spacing: 0.02em;
        }

        /* Decorative divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        .divider-heart { color: var(--sky-deep); font-size: 0.7rem; }

        /* ─── CANVAS ─── */
        #treeCanvas {
            display: block;
            border-radius: 8px;
            margin: 0 auto;
        }

        /* ─── TIMER ─── */
        .timer-container {
            text-align: center;
            margin-top: 6px;
            opacity: 0;
            animation: slideUp 1s 1s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .timer-label {
            font-size: 0.72rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #a1887f;
            margin-bottom: 6px;
        }

        #timer {
            display: inline-flex;
            gap: 12px;
            align-items: baseline;
        }

        .time-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-value {
            font-size: 1.6rem;
            font-weight: 300;
            color: var(--sky-deep);
            line-height: 1;
            min-width: 2.2ch;
            text-align: center;
        }

        .time-label {
            font-size: 0.6rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #a1887f;
            margin-top: 2px;
        }

        .time-sep {
            font-size: 1.2rem;
            color: var(--gold);
            margin-bottom: 12px;
            opacity: 0.6;
        }

        #final-message {
            font-family: 'Snell Roundhand', 'Segoe Script', 'Bradley Hand', cursive;
            font-size: 1.5rem;
            opacity: 0;
            transition: opacity 2.5s;
            color: var(--red-seal);
            margin-top: 8px;
            text-shadow: 0 0 20px rgba(192,57,43,0.3);
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.45; }
            50% { opacity: 1; }
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 400px) {
            .envelope { width: 300px; height: 194px; }
            .env-inside { border-left-width: 150px; border-right-width: 150px; border-top-width: 97px; }
            .flap { border-left-width: 150px; border-right-width: 150px; border-top-width: 99px; }
            .env-side-left { border-right-width: 150px; }
            .env-side-right { border-left-width: 150px; }

            #treeCanvas { width: 360px !important; height: 420px !important; }
        }
    </style>
</head>
<body>

    <!-- FLOATING PARTICLES (created by JS) -->

    <!-- ENVELOPE -->
    <a id="envelope-wrapper" href="javascript:void(0)" ontouchend="openLetter()" onclick="openLetter()">
        <div class="envelope">
            <div class="env-back"></div>
            <div class="env-inside"></div>
            <div class="env-side-left"></div>
            <div class="env-side-right"></div>
            <!-- Decorative inner pattern -->
            <svg class="env-decoration" viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
                <!-- Tiny hearts scattered in the lower half -->
                <g fill="rgba(192,57,43,0.18)" font-size="9">
                    <text x="30"  y="95">♥</text>
                    <text x="75"  y="108">♥</text>
                    <text x="130" y="100">♥</text>
                    <text x="185" y="110">♥</text>
                    <text x="240" y="96">♥</text>
                    <text x="265" y="112">♥</text>
                    <text x="55"  y="118">♥</text>
                    <text x="155" y="118">♥</text>
                    <text x="210" y="102">♥</text>
                </g>
                <!-- Subtle gold border line -->
                <rect x="10" y="10" width="280" height="100" rx="2"
                      fill="none" stroke="rgba(201,168,76,0.3)" stroke-width="1"/>
            </svg>
            <div class="flap"></div>

            <div id="seal">
                <svg viewBox="0 0 32 32"><path d="M16 28.5L2.5 15C1.1 13.6 1.1 11.4 2.5 10c1.4-1.4 3.6-1.4 5 0L16 18.5l8.5-8.5c1.4-1.4 3.6-1.4 5 0s1.4 3.6 0 5L16 28.5z"/></svg>
            </div>
        </div>
        <p class="tap-instruction">Tocca per aprire</p>
    </a>

    <!-- MAIN CONTENT -->
    <div id="main-content" class="container hidden">
        <div id="messages">
            <h2 id="title">Fiori Azzurri come il tuo colore preferito</h2>
            <div class="divider"><div class="divider-line"></div><span class="divider-heart">♥</span><div class="divider-line"></div></div>
            <p id="quote">"Tanti auguri amore, ti voglio anche tanto bene"</p>
        </div>

        <canvas id="treeCanvas" width="560" height="520"></canvas>

        <div class="timer-container">
            <p class="timer-label">I love you since</p>
            <div id="timer">
                <div class="time-block">
                    <span class="time-value" id="t-days">000</span>
                    <span class="time-label">giorni</span>
                </div>
                <span class="time-sep">·</span>
                <div class="time-block">
                    <span class="time-value" id="t-hours">00</span>
                    <span class="time-label">ore</span>
                </div>
                <span class="time-sep">·</span>
                <div class="time-block">
                    <span class="time-value" id="t-mins">00</span>
                    <span class="time-label">minuti</span>
                </div>
                <span class="time-sep">·</span>
                <div class="time-block">
                    <span class="time-value" id="t-secs">00</span>
                    <span class="time-label">secondi</span>
                </div>
            </div>
            <p id="final-message">— Ti Amo —</p>
        </div>
    </div>

    <script>
    // ─── CONFIG ───
    const START_DATE = new Date("2023-08-29T00:00:00").getTime();
    const BLOOM_COLOR = "#87CEEB";
    const BLOOM_COLOR_DARK = "#4682B4";
    const GOLD_COLOR = "#c9a84c";

    // ─── PARTICLES ───
    function createParticles() {
        const colors = ["#87CEEB", "#c9a84c", "#f4a7b9", "#b5d5f0"];
        for (let i = 0; i < 22; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = 3 + Math.random() * 5;
            p.style.cssText = `
                width:${size}px; height:${size}px;
                left:${Math.random()*100}vw;
                background:${colors[Math.floor(Math.random()*colors.length)]};
                opacity:0;
                animation-duration:${8+Math.random()*14}s;
                animation-delay:${Math.random()*12}s;
            `;
            document.body.appendChild(p);
        }
    }
    // ontouchend + onclick inline on the <a> tag handles WhatsApp webview

    createParticles();

    // ─── ENVELOPE OPEN ───
    let letterOpened = false;

    function openLetter() {
        if (letterOpened) return;
        letterOpened = true;

        const wrapper = document.getElementById('envelope-wrapper');
        const envelope = wrapper.querySelector('.envelope');
        const main = document.getElementById('main-content');

        envelope.classList.add('open');

        setTimeout(() => {
            wrapper.style.transition = 'opacity 0.8s, transform 0.8s';
            wrapper.style.opacity = '0';
            wrapper.style.transform = 'scale(0.9) translateY(10px)';
        }, 1000);

        setTimeout(() => {
            wrapper.style.display = 'none';
            main.classList.remove('hidden');
            main.classList.add('fade-in');
            startTreeAnimation();
        }, 1900);
    }

    // ─── CANVAS SETUP ───
    const canvas = document.getElementById('treeCanvas');
    const ctx = canvas.getContext('2d');

    // Scale for retina
    function setupCanvas() {
        const dpr = window.devicePixelRatio || 1;
        const W = 560, H = 520;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.scale(dpr, dpr);
        return { W, H };
    }
    const { W, H } = setupCanvas();

    // ─── DRAW HEART ───
    function drawHeart(x, y, size, color, glow) {
        ctx.save();
        ctx.beginPath();
        ctx.translate(x, y);

        // Heart via bezier curves, size-scaled
        const s = size;
        ctx.moveTo(0, -s * 0.3);
        ctx.bezierCurveTo( s * 0.5, -s * 0.9,  s * 1.0,  s * 0.1,  0,       s * 0.7);
        ctx.bezierCurveTo(-s * 1.0,  s * 0.1, -s * 0.5, -s * 0.9,  0,      -s * 0.3);

        if (glow) {
            ctx.shadowBlur = 14;
            ctx.shadowColor = color;
        }
        ctx.fillStyle = color;
        ctx.fill();
        ctx.closePath();
        ctx.restore();
    }

    // Tiny sparkle dot
    function drawSparkle(x, y, r, color) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.shadowBlur = 8;
        ctx.shadowColor = color;
        ctx.fill();
        ctx.restore();
    }

    // ─── BRANCH DRAWING ───
    // We queue draw calls to simulate growth nicely
    const drawQueue = [];
    let queueIndex = 0;
    let queueTimer = null;

    function queueBranch(startX, startY, len, angle, width, depth) {
        drawQueue.push({ type: 'branch', startX, startY, len, angle, width, depth });
    }

    function processQueue() {
        if (queueIndex >= drawQueue.length) {
            // All done — show final message
            setTimeout(() => {
                document.getElementById('final-message').style.opacity = '1';
            }, 300);
            return;
        }

        const item = drawQueue[queueIndex++];

        if (item.type === 'branch') {
            const { startX, startY, len, angle, width, depth } = item;

            const rLen = len * (0.88 + Math.random() * 0.18);
            const rAngle = angle + (Math.random() - 0.5) * 8;
            const rad = rAngle * Math.PI / 180;

            const endX = startX + Math.sin(rad) * rLen;
            const endY = startY - Math.cos(rad) * rLen;

            // Draw the branch segment
            ctx.beginPath();
            ctx.strokeStyle = lerpBranchColor(depth);
            ctx.lineWidth = width;
            ctx.lineCap = 'round';

            const cpX = startX + Math.sin(rad) * (rLen * 0.5) + (Math.random()-0.5) * 8;
            const cpY = startY - Math.cos(rad) * (rLen * 0.5) + (Math.random()-0.5) * 8;

            ctx.moveTo(startX, startY);
            ctx.quadraticCurveTo(cpX, cpY, endX, endY);
            ctx.stroke();

            // Enqueue children — solo 2 rami sempre, spread ampio per aprire la chioma
            if (depth > 1) {
                // Spread molto più ampio: i rami alti si aprono a ventaglio
                const spread = depth > 5 ? 55 : depth > 3 ? 80 : 95;
                // Sempre esattamente 2 figli, uno a sinistra uno a destra
                const leftAngle  = rAngle - (20 + Math.random() * (spread * 0.5));
                const rightAngle = rAngle + (20 + Math.random() * (spread * 0.5));
                // I rami si accorciano meno: 0.82 invece di 0.72 → albero più alto
                const nextLen = rLen * 0.82;
                const nextW   = Math.max(width * 0.65, 0.8);
                queueBranch(endX, endY, nextLen, leftAngle,  nextW, depth - 1);
                queueBranch(endX, endY, nextLen, rightAngle, nextW, depth - 1);
            }

            // Cuori grandi solo alle punte (depth 1 e 2)
            if (depth <= 2) {
                const chance = depth === 1 ? 1.0 : 0.7;
                if (Math.random() < chance) {
                    const hx = endX + (Math.random()-0.5) * 8;
                    const hy = endY + (Math.random()-0.5) * 8;
                    // Cuori grandi: da 7 a 13px
                    const hs = 7 + Math.random() * 6;
                    const col = Math.random() > 0.3 ? BLOOM_COLOR : "#c8a8d8";
                    drawQueue.push({ type: 'heart', x: hx, y: hy, size: hs, color: col });
                }
                if (Math.random() < 0.35) {
                    drawQueue.push({ type: 'sparkle', x: endX, y: endY });
                }
            }
        } else if (item.type === 'heart') {
            drawHeart(item.x, item.y, item.size, item.color, true);
        } else if (item.type === 'sparkle') {
            drawSparkle(item.x, item.y, 1.5 + Math.random(), GOLD_COLOR);
        }

        // Speed: faster early (trunk), slower at tips
        const delay = 18 + Math.random() * 30;
        queueTimer = setTimeout(processQueue, delay);
    }

    function lerpBranchColor(depth) {
        // depth 8 = trunk (dark), depth 1 = twig (medium brown)
        const t = 1 - (depth / 9);
        const r = Math.round(60 + t * 50);
        const g = Math.round(35 + t * 30);
        const b = Math.round(20 + t * 20);
        return `rgb(${r},${g},${b})`;
    }

    function startTreeAnimation() {
        ctx.clearRect(0, 0, W, H);
        drawQueue.length = 0;
        queueIndex = 0;
        if (queueTimer) clearTimeout(queueTimer);

        // Slight random trunk lean
        const trunkAngle = (Math.random() - 0.5) * 4;
        queueBranch(280, 512, 85, trunkAngle, 12, 7);

        processQueue();
    }

    // ─── TIMER ───
    function pad(n, len = 2) { return String(n).padStart(len, '0'); }

    function updateTimer() {
        const diff = Date.now() - START_DATE;
        const days    = Math.floor(diff / 86400000);
        const hours   = Math.floor((diff % 86400000) / 3600000);
        const minutes = Math.floor((diff % 3600000)  / 60000);
        const seconds = Math.floor((diff % 60000)    / 1000);

        document.getElementById('t-days').textContent  = pad(days, 3);
        document.getElementById('t-hours').textContent = pad(hours);
        document.getElementById('t-mins').textContent  = pad(minutes);
        document.getElementById('t-secs').textContent  = pad(seconds);
    }

    setInterval(updateTimer, 1000);
    updateTimer();
    </script>
</body>
</html>
